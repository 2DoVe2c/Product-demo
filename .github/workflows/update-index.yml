name: Update demo index

on:
  push:
    branches:
      - main
    paths:
      - "**.html"
      - ".github/workflows/update-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate grouped index.html
        run: |
          python3 <<'PY'
          from pathlib import Path
          from urllib.parse import quote
          from collections import defaultdict
          from datetime import datetime
          import subprocess
          import html

          root = Path(".")
          demos = []

          def upload_time(path):
              try:
                  result = subprocess.check_output(
                      ["git", "log", "--follow", "--diff-filter=A", "--format=%ct", "--", str(path)],
                      text=True
                  ).strip().splitlines()

                  if result:
                      return datetime.fromtimestamp(int(result[-1]))
              except Exception:
                  pass

              return datetime.fromtimestamp(path.stat().st_mtime)

          for p in root.rglob("*.html"):
              if ".git" in p.parts or ".github" in p.parts:
                  continue
              if p.name.lower() == "index.html":
                  continue

              created_at = upload_time(p)

              demos.append({
                  "path": p,
                  "title": p.stem,
                  "month_key": created_at.strftime("%Y-%m"),
                  "month_label": f"{created_at.year} 年 {created_at.month} 月",
                  "date_label": created_at.strftime("%Y-%m-%d"),
              })

          demos.sort(
              key=lambda x: (x["month_key"], x["date_label"], x["title"]),
              reverse=True
          )

          groups = defaultdict(list)
          for demo in demos:
              groups[demo["month_key"]].append(demo)

          month_keys = sorted(groups.keys(), reverse=True)

          sections = []

          for index, month_key in enumerate(month_keys):
              month_demos = groups[month_key]
              month_label = month_demos[0]["month_label"]

              # 只有最新月份默认展开，其他月份默认折叠
              open_attr = " open" if index == 0 else ""

              items = []
              for demo in month_demos:
                  href = quote(str(demo["path"]).replace("\\", "/"))
                  title = html.escape(demo["title"])
                  title_attr = html.escape(demo["title"].lower(), quote=True)
                  date_label = html.escape(demo["date_label"])

                  items.append(f"""
                    <li class="demo-item" data-title="{title_attr}">
                      <a href="./{href}" target="_blank" rel="noopener">{title}</a>
                      <span>{date_label}</span>
                    </li>
                  """)

              sections.append(f"""
                <details class="month-group"{open_attr}>
                  <summary>
                    <span>{html.escape(month_label)}</span>
                    <em>{len(month_demos)} 个 demo</em>
                  </summary>
                  <ul>
                    {''.join(items)}
                  </ul>
                </details>
              """)

          content = f"""<!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Product Demo 预览目录</title>
            <style>
              * {{
                box-sizing: border-box;
              }}

              body {{
                margin: 0;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                color: #172033;
                background: #f6f7fb;
              }}

              main {{
                width: min(960px, calc(100% - 32px));
                margin: 40px auto;
              }}

              header {{
                margin-bottom: 24px;
              }}

              h1 {{
                margin: 0 0 8px;
                font-size: 28px;
                line-height: 1.25;
              }}

              .meta {{
                margin: 0;
                color: #667085;
                font-size: 14px;
              }}

              .toolbar {{
                margin: 24px 0;
              }}

              #search {{
                width: 100%;
                height: 44px;
                padding: 0 14px;
                border: 1px solid #d0d5dd;
                border-radius: 8px;
                background: #fff;
                color: #172033;
                font-size: 15px;
                outline: none;
              }}

              #search:focus {{
                border-color: #2f6fed;
                box-shadow: 0 0 0 3px rgba(47, 111, 237, 0.14);
              }}

              .month-group {{
                margin: 14px 0;
                border: 1px solid #e4e7ec;
                border-radius: 8px;
                background: #fff;
                overflow: hidden;
              }}

              summary {{
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                padding: 16px 18px;
                cursor: pointer;
                font-weight: 700;
                user-select: none;
              }}

              summary em {{
                color: #667085;
                font-size: 13px;
                font-style: normal;
                font-weight: 500;
              }}

              ul {{
                list-style: none;
                margin: 0;
                padding: 0 18px 12px;
              }}

              .demo-item {{
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                padding: 12px 0;
                border-top: 1px solid #eef0f4;
              }}

              .demo-item a {{
                min-width: 0;
                color: #175cd3;
                font-weight: 600;
                text-decoration: none;
                overflow-wrap: anywhere;
              }}

              .demo-item a:hover {{
                text-decoration: underline;
              }}

              .demo-item span {{
                flex: 0 0 auto;
                color: #667085;
                font-size: 13px;
              }}

              .empty {{
                padding: 24px;
                border: 1px solid #e4e7ec;
                border-radius: 8px;
                background: #fff;
                color: #667085;
              }}

              @media (max-width: 640px) {{
                main {{
                  width: min(100% - 24px, 960px);
                  margin: 24px auto;
                }}

                .demo-item {{
                  align-items: flex-start;
                  flex-direction: column;
                  gap: 4px;
                }}
              }}
            </style>
          </head>
          <body>
            <main>
              <header>
                <h1>Product Demo 预览目录</h1>
                <p class="meta">共 {len(demos)} 个 demo，按上传月份自动归档。</p>
              </header>

              <div class="toolbar">
                <input id="search" type="search" placeholder="搜索 demo 名称">
              </div>

              <section id="demo-list">
                {''.join(sections) if sections else '<div class="empty">暂无 demo 文件</div>'}
              </section>
            </main>

            <script>
              const searchInput = document.querySelector("#search");
              const groups = Array.from(document.querySelectorAll(".month-group"));

              searchInput.addEventListener("input", () => {{
                const keyword = searchInput.value.trim().toLowerCase();

                groups.forEach((group) => {{
                  const items = Array.from(group.querySelectorAll(".demo-item"));
                  let visibleCount = 0;

                  items.forEach((item) => {{
                    const title = item.dataset.title || "";
                    const matched = !keyword || title.includes(keyword);
                    item.hidden = !matched;
                    if (matched) visibleCount += 1;
                  }});

                  group.hidden = visibleCount === 0;

                  if (keyword && visibleCount > 0) {{
                    group.open = true;
                  }}

                  if (!keyword) {{
                    group.open = group === groups[0];
                  }}
                }});
              }});
            </script>
          </body>
          </html>
          """

          Path("index.html").write_text(content, encoding="utf-8")
          PY

      - name: Commit index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto update demo index"
          git push
