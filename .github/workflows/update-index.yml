name: Update demo index

on:
  push:
    branches:
      - main
    paths:
      - "**.html"
      - ".github/workflows/update-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate index.html
        run: |
          python3 <<'PY'
          from pathlib import Path
          from urllib.parse import quote
          import html

          root = Path(".")
          files = []

          for p in root.rglob("*.html"):
              if ".git" in p.parts or ".github" in p.parts:
                  continue
              if p.name.lower() == "index.html":
                  continue
              files.append(p)

          files.sort(key=lambda x: str(x).lower())

          items = []
          for p in files:
              name = p.stem
              href = quote(str(p).replace("\\", "/"))
              items.append(f'    <li><a href="./{href}">{html.escape(name)}</a></li>')

          content = f"""<!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Product Demo 预览目录</title>
            <style>
              body {{
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                max-width: 900px;
                margin: 48px auto;
                padding: 0 24px;
                line-height: 1.7;
                color: #111827;
              }}
              h1 {{ font-size: 28px; }}
              li {{ margin: 10px 0; }}
              a {{ color: #2563eb; text-decoration: none; }}
              a:hover {{ text-decoration: underline; }}
            </style>
          </head>
          <body>
            <h1>Product Demo 预览目录</h1>
            <ul>
          {chr(10).join(items) if items else "    <li>暂无 demo 文件</li>"}
            </ul>
          </body>
          </html>
          """

          Path("index.html").write_text(content, encoding="utf-8")
          PY

      - name: Commit index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto update demo index"
          git push
